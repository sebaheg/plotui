name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      # plotui-py is a cdylib extension module that only links through maturin,
      # so lint/test the pure crates here; the python job covers the bindings.
      - run: cargo clippy -p plotui-core -p plotui-protocol --all-targets -- -D warnings
      - run: cargo test -p plotui-core -p plotui-protocol

  python:
    name: Python wheel + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install maturin pytest textual
      - run: maturin build --release --out dist
      - run: pip install dist/*.whl
      - run: pytest tests -v
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-x86_64
          path: dist/*.whl
